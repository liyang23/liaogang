# Integration Test profile - 真实测试环境（MySQL + Redis + MinIO）
# 配置来源：test_env.txt（用户提供，2026-07-15）
# 用途：集成测试 / 联调环境，激活 it profile 时接管
#   - Maven：`mvn test -Dspring.profiles.active=it` 或 failsafe 插件
#   - JUnit：`@ActiveProfiles("it")`
# 注意：仅测试环境使用；生产凭据走环境变量（K8s Secret），不入仓库

spring:
  # MySQL 8 测试库（127.0.0.1:3306 / root / Zcx123456!）
  # 自动创建 km_platform_it 库；Flyway 自动迁移 V9001 seed
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/km_platform_it?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: Zcx123456!
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      pool-name: KmPlatformItHikariPool

  # Flyway 迁移（it 环境真实执行；与 prod 一致）
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    clean-disabled: false  # it 环境允许 flyway:clean 用于测试重置

  # Redis 7 测试实例（127.0.0.1:6379 / 无密码）
  # database=1 与本地 dev 隔离，避免污染 dev db 0
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: ""
      database: 1
      timeout: 3s
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1

  # SpringDoc 集成测试需要查 OpenAPI 契约
  springdoc:
    api-docs:
      enabled: true
    swagger-ui:
      enabled: true

# MinIO 测试环境（API 127.0.0.1:9000 / Console 127.0.0.1:9001）
# Q-I3 测试环境版；生产由 ops 提供独立 endpoint + 凭据
# 重要：MinIO 9000 = S3 API 端口（MinIO Java SDK 访问），9001 = Console Web UI（仅浏览器）
# test_env.txt 写的 9001 是 Console 端口，application 需用 9000 才能调 S3 API
app:
  minio:
    endpoint: http://127.0.0.1:9000
    access-key: minioadmin
    secret-key: minioadmin@2026
    bucket-name: km-platform-it
  # 辽港统一认证保留 mock 模式（Q-I2 未提供，慧应用 APIKEY + PAAS 地址仅生产可联调）
  # 由主 application.yml 的 mock-mode=true 兜底
  # DeepSeek v4 保留 mock 客户端（Q-I1 未提供）
  # 由主 application.yml 的 demo-api-key-mock 兜底

# 日志：集成测试输出更详细便于排查
logging:
  level:
    com.liaogang.famou.km: DEBUG
    org.springframework.jdbc.core: INFO
    org.flywaydb: INFO

# Actuator：集成测试暴露健康检查 + 指标
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
