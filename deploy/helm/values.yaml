# km-platform Helm Chart 默认配置
# 来源：TP-1 T002（K8s + Helm 部署基础）
# 用途：Sprint 1 默认 values.yaml（开发 / 测试 / 生产环境通过 -f 覆盖）

# 镜像仓库（OQ-I3 待 owner 确认）
image:
  repository: registry.example.com/km-platform
  # F-25 修复：Always（确保部署时拉取最新镜像，避免使用本地旧版本缓存）
  pullPolicy: Always
  tag: "1.0.0-SNAPSHOT"

# 微服务配置
frontend:
  enabled: true
  replicaCount: 1
  image:
    repository: registry.example.com/km-platform/frontend
    tag: "1.0.0-SNAPSHOT"
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

backend:
  enabled: true
  replicaCount: 1
  image:
    repository: registry.example.com/km-platform/backend
    tag: "1.0.0-SNAPSHOT"
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 2Gi

# Ingress 配置（Q-I5 K8s Ingress 选型）
ingress:
  enabled: false  # 默认关闭，由运维在生产环境覆盖
  className: nginx  # 或 traefik / istio
  annotations: {}
  hosts:
    - host: km-platform.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# 数据库（生产环境使用外部托管服务；开发环境使用 subchart）
mysql:
  enabled: true  # 开发环境启用内置 MySQL
  subchart: true  # 引用 Bitnami MySQL
  auth:
    rootPassword: devroot
    database: km_platform
    username: km_user
    password: devpass
  primary:
    persistence:
      enabled: false  # 开发环境使用 emptyDir

redis:
  enabled: true
  subchart: true
  auth:
    enabled: false  # 开发环境无密码

minio:
  enabled: true
  subchart: true
  auth:
    rootUser: minio
    rootPassword: minio123

# 业务配置
config:
  spring:
    datasource:
      url: jdbc:mysql://km-platform-mysql:3306/km_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      username: km_user
      password: devpass
    redis:
      host: km-platform-redis-master
      port: 6379
  app:
    # 辽港统一认证（OQ-23 取代 OIDC）
    liaogong-auth:
      api-key: ""  # Q-I2 待 owner 提供
      paas-base-url: "https://appstore.cmft.com/paas-market"
      endpoint: "/api/v1/system/getUserInfoByCode"
      code-verifier-ttl-seconds: 300  # sessionStorage 缓存过期时间（5 分钟）
    # DeepSeek v4 LLM（OQ-I1 待 owner 提供）
    llm:
      provider: deepseek
      api-key: ""
      base-url: "https://api.deepseek.com/v4"
      model: "deepseek-v4"
      timeout-seconds: 5
      quota:
        platform-percentage: 80
        user-percentage: 20
